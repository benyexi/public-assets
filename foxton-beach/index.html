<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foxton Beach</title>
  <meta name="description" content="Foxton Beach memory page with ambient ocean sound.">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #d7eceb;
      color: #173334;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(215, 236, 235, 0.92), rgba(247, 241, 229, 0.96)),
        radial-gradient(circle at 50% 0%, #93c7c6 0, transparent 45%);
    }

    main {
      width: min(100%, 920px);
    }

    figure {
      margin: 0;
      display: grid;
      gap: 14px;
    }

    img {
      display: block;
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(21, 51, 51, 0.22);
      background: #f8faf9;
    }

    figcaption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #2d5454;
      font-size: 15px;
      line-height: 1.35;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      min-width: 132px;
      background: #165c5c;
      color: white;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 92, 92, 0.24);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      figcaption {
        align-items: stretch;
        flex-direction: column;
        font-size: 14px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <img src="../qr-assets/xi-cv-image-2026-05-28.jpg" alt="Foxton Beach">
      <figcaption>
        <span>Foxton Beach</span>
        <button id="soundButton" type="button">Play sound</button>
      </figcaption>
    </figure>
  </main>

  <audio id="ambientAudio" src="./foxton-beach-ambient.mp3" loop preload="auto"></audio>

  <script>
    const audio = document.getElementById("ambientAudio");
    const button = document.getElementById("soundButton");

    audio.volume = 0.72;

    async function toggleSound() {
      if (audio.paused) {
        await audio.play();
        button.textContent = "Pause sound";
      } else {
        audio.pause();
        button.textContent = "Play sound";
      }
    }

    button.addEventListener("click", () => {
      toggleSound().catch(() => {
        button.textContent = "Tap to play";
      });
    });
  </script>
</body>
</html>

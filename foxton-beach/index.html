<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foxton Beach</title>
  <meta name="description" content="Foxton Beach memory page with ambient ocean sound.">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #d7eceb;
      color: #173334;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(215, 236, 235, 0.92), rgba(247, 241, 229, 0.96)),
        radial-gradient(circle at 50% 0%, #93c7c6 0, transparent 45%);
    }

    main {
      width: min(100%, 920px);
    }

    figure {
      margin: 0;
      display: grid;
      gap: 14px;
    }

    img {
      display: block;
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(21, 51, 51, 0.22);
      background: #f8faf9;
    }

    figcaption {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #2d5454;
      font-size: 15px;
      line-height: 1.35;
    }

    .sound-prompt {
      display: flex;
      justify-content: center;
    }

    .sound-prompt[hidden] {
      display: none;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #17485a;
      color: #ffffff;
      font: inherit;
      font-weight: 600;
      box-shadow: 0 8px 22px rgba(23, 72, 90, 0.22);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      figcaption {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <figure>
      <img src="../qr-assets/xi-cv-image-2026-05-28.jpg" alt="Foxton Beach">
      <figcaption>
        <span>Foxton Beach</span>
        <span id="soundPrompt" class="sound-prompt" hidden>
          <button id="soundButton" type="button">Play sound</button>
        </span>
      </figcaption>
    </figure>
  </main>

  <audio id="ambientAudio" src="./foxton-beach-ambient.mp3?v=20260530b" autoplay loop preload="auto" playsinline></audio>

  <script>
    const audio = document.getElementById("ambientAudio");
    const prompt = document.getElementById("soundPrompt");
    const button = document.getElementById("soundButton");

    audio.volume = 0.72;

    async function playAmbient() {
      audio.muted = false;
      audio.currentTime = audio.currentTime || 0;
      await audio.play();
      prompt.hidden = true;
    }

    function tryPlaySoon() {
      playAmbient().catch(() => {
        prompt.hidden = false;
      });
    }

    button.addEventListener("click", () => {
      if (audio.paused) {
        playAmbient().catch(() => {
          prompt.hidden = false;
        });
      } else {
        audio.pause();
        prompt.hidden = false;
      }
    });

    window.addEventListener("load", tryPlaySoon, { once: true });
    document.addEventListener("DOMContentLoaded", tryPlaySoon, { once: true });
    document.addEventListener("WeixinJSBridgeReady", tryPlaySoon, { once: true });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && audio.paused) {
        tryPlaySoon();
      }
    });

    [250, 800, 1600, 3000].forEach((delay) => {
      window.setTimeout(() => {
        if (audio.paused) {
          tryPlaySoon();
        }
      }, delay);
    });
  </script>
</body>
</html>
